# GitLab CI/CD Pipeline — ATLAS GitOps for Morpheus
#
# Stages:
#   validate  → lint YAML files and run tests on every push
#   deploy    → import to TEST (on merge to test branch)
#   promote   → import to PROD (on merge to main/prod branch)
#   drift     → scheduled job that detects config drift
#
# Required CI/CD Variables (set in GitLab → Settings → CI/CD → Variables):
#   MORPHEUS_TOKEN_DEV    — API token for DEV Morpheus
#   MORPHEUS_TOKEN_TEST   — API token for TEST Morpheus
#   MORPHEUS_TOKEN_PROD   — API token for PROD Morpheus
#   MORPHEUS_URL_DEV      — Base URL of DEV Morpheus
#   MORPHEUS_URL_TEST     — Base URL of TEST Morpheus
#   MORPHEUS_URL_PROD     — Base URL of PROD Morpheus

stages:
  - validate
  - deploy
  - promote
  - drift

default:
  image: python:3.11-slim
  before_script:
    - pip install -q -r requirements.txt

# ---------------------------------------------------------------------------
# VALIDATE — runs on every push to any branch
# ---------------------------------------------------------------------------

validate:yaml:
  stage: validate
  script:
    - python -c "
      import yaml, os, sys
      errors = []
      for root, dirs, files in os.walk('environments'):
          for f in files:
              if f.endswith('.yml'):
                  path = os.path.join(root, f)
                  try:
                      yaml.safe_load(open(path))
                  except yaml.YAMLError as e:
                      errors.append(f'{path}: {e}')
      if errors:
          print('YAML validation failed:')
          [print(e) for e in errors]
          sys.exit(1)
      print('All YAML files are valid.')
      "
  rules:
    - when: always

validate:tests:
  stage: validate
  script:
    - pytest tests/ -v
  rules:
    - when: always

# ---------------------------------------------------------------------------
# DEPLOY TO TEST — triggers on merge to `test` branch
# ---------------------------------------------------------------------------

deploy:test:
  stage: deploy
  environment:
    name: test
    url: $MORPHEUS_URL_TEST
  variables:
    MORPHEUS_URL: $MORPHEUS_URL_TEST
    MORPHEUS_TOKEN: $MORPHEUS_TOKEN_TEST
    MORPHEUS_ENV: test
  script:
    - echo "Deploying to TEST environment..."
    - python scripts/importer.py --env test --dry-run
    - python scripts/importer.py --env test
    - echo "Deployment to TEST complete."
  rules:
    - if: '$CI_COMMIT_BRANCH == "test"'
  # Simple rollback: if the job fails, re-run the last successful version
  # by re-importing from the previous Git state (see scripts/rollback.sh)
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "failed" ]; then
        echo "Deploy failed. A rollback should be triggered manually."
        echo "Run: git revert HEAD && git push"
      fi

# ---------------------------------------------------------------------------
# PROMOTE TO PROD — triggers on merge to `main`
# ---------------------------------------------------------------------------

promote:prod:
  stage: promote
  environment:
    name: production
    url: $MORPHEUS_URL_PROD
  variables:
    MORPHEUS_URL: $MORPHEUS_URL_PROD
    MORPHEUS_TOKEN: $MORPHEUS_TOKEN_PROD
    MORPHEUS_ENV: prod
  script:
    - echo "Promoting to PROD environment..."
    - python scripts/importer.py --env prod --dry-run
    - python scripts/importer.py --env prod
    - echo "Promotion to PROD complete."
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  # Require manual approval before running in prod
  when: manual

# ---------------------------------------------------------------------------
# DRIFT DETECTION — runs on a schedule (configure in GitLab → Schedules)
# Set schedule to run daily, e.g. "0 6 * * *"
# ---------------------------------------------------------------------------

drift:detect:
  stage: drift
  variables:
    MORPHEUS_URL: $MORPHEUS_URL_DEV
    MORPHEUS_TOKEN: $MORPHEUS_TOKEN_DEV
    MORPHEUS_ENV: dev
  script:
    - echo "Running drift detection for DEV..."
    - python scripts/drift_detect.py --env dev
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  allow_failure: false
